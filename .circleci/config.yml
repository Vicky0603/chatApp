version: 2.1

jobs:
  test-api:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-api-v1-{{ checksum "package-lock.json" }}
            - npm-api-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-api-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
            - apps/api/node_modules
      - run:
          name: Build API
          command: npm run build --workspace @domain-chat/api
      - run:
          name: Test API
          command: npm run test --workspace @domain-chat/api

  test-web:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-web-v1-{{ checksum "package-lock.json" }}
            - npm-web-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-web-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
            - apps/web/node_modules
      - run:
          name: Build web
          command: npm run build --workspace @domain-chat/web
      - run:
          name: Test web
          command: npm run test --workspace @domain-chat/web

workflows:
  ci:
    jobs:
      - test-api
      - test-web
