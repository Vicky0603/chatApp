services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      NESTJS_PORT: ${NESTJS_PORT:-3001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    ports:
      - "${NESTJS_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXTJS_PORT: ${NEXTJS_PORT:-3000}
      NESTJS_BASE_URL: http://api:3001
    depends_on:
      - api
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
